<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Jaguar</title>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/contact.css">
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="models.html">Models</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <section class="contact-hero">
    <h1>Get in Touch</h1>
    <p>Contact us for inquiries, test drives, or dealership information.</p>
  </section>

  <section class="contact-form">
    <form action="#" method="post">
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Phone Number">
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <div class="footer-content">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Jaguar. All rights reserved.</p>
      <div class="social-icons">
        <a href="https://facebook.com/jaguar"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com/jaguar"><i class="fab fa-twitter"></i></a>
        <a href="https://instagram.com/jaguar"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
  </footer>
</body>
</html>
